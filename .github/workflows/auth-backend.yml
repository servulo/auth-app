name: Auth Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'auth-backend/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: auth-backend
        run: ./mvnw package -DskipTests

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: sprjacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: auth-backend
          file: auth-backend/src/main/docker/Dockerfile.jvm
          push: true
          tags: sprjacr.azurecr.io/auth-backend:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name sprj-ca-auth-backend \
            --resource-group sprj-rg \
            --image sprjacr.azurecr.io/auth-backend:latest
