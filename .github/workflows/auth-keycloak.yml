name: Auth Keycloak CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'auth-keycloak/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Keycloak

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: sprjacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: auth-keycloak
          push: true
          tags: sprjacr.azurecr.io/auth-keycloak:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name sprj-ca-auth-keycloak \
            --resource-group sprj-rg \
            --image sprjacr.azurecr.io/auth-keycloak:latest
