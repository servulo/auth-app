services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: auth-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "SprjAuth@2025"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./auth-sqlserver/init.sh:/init.sh
    entrypoint: ["/bin/bash", "/init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SprjAuth@2025' -d sprj_auth -Q 'SELECT 1' -No 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: auth-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: mssql
      KC_DB_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=sprj_auth;encrypt=false"
      KC_DB_USERNAME: sa
      KC_DB_PASSWORD: "SprjAuth@2025"
    ports:
      - "8080:8080"
    volumes:
      - ./auth-keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      sqlserver:
        condition: service_healthy

  keycloak-init:
    image: curlimages/curl:latest
    container_name: auth-keycloak-init
    volumes:
      - ./auth-keycloak/init.sh:/init.sh
    entrypoint: ["sh", "/init.sh"]
    depends_on:
      - keycloak
    restart: "no"

  # auth-backend: em DEV, rodar separado com "quarkus dev" dentro de auth-backend/
