services:
  postgresql:
    image: postgres:16
    container_name: auth-postgresql
    environment:
      POSTGRES_DB: sprj_auth
      POSTGRES_USER: sprj
      POSTGRES_PASSWORD: sprj
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprj -d sprj_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: auth-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgresql:5432/sprj_auth
      KC_DB_USERNAME: sprj
      KC_DB_PASSWORD: sprj
    ports:
      - "8080:8080"
    volumes:
      - ./auth-keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgresql:
        condition: service_healthy

  # auth-backend: em DEV, rodar separado com "quarkus dev" dentro de auth-backend/
