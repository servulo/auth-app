  # auth-backend:
  #   build:
  #     context: ./auth-backend
  #     dockerfile: src/main/docker/Dockerfile.jvm
  #   container_name: auth-backend
  #   environment:
  #     QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgresql:5432/sprj_auth
  #     QUARKUS_DATASOURCE_USERNAME: sprj
  #     QUARKUS_DATASOURCE_PASSWORD: sprj
  #     QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/sprj
  #     QUARKUS_OIDC_CLIENT_ID: auth-frontend
  #   ports:
  #     - "8081:8081"
  #   depends_on:
  #     postgresql:
  #       condition: service_healthy
