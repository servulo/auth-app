<div class="min-h-screen flex bg-slate-100">

  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 flex flex-col flex-shrink-0">

    <!-- Logo -->
    <div class="px-6 py-5 border-b border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center">
          <i class="pi pi-shield text-white text-sm"></i>
        </div>
        <div>
          <p class="text-white font-bold text-sm leading-none">SPRJ Auth</p>
          <p class="text-slate-400 text-xs mt-0.5">Admin</p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <p class="text-slate-500 text-xs font-semibold uppercase tracking-wider px-3 mb-2">Gestão</p>

      <a
        routerLink="usuarios"
        routerLinkActive="bg-slate-800 text-white"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"
      >
        <i class="pi pi-users w-4 text-center"></i>
        <span>Usuários</span>
      </a>

      <a
        routerLink="aplicacoes"
        routerLinkActive="bg-slate-800 text-white"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"
      >
        <i class="pi pi-th-large w-4 text-center"></i>
        <span>Aplicações</span>
      </a>
    </nav>

    <!-- User info -->
    <div class="px-4 py-4 border-t border-slate-800">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
          {{ user()?.given_name?.[0] }}{{ user()?.family_name?.[0] }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-white truncate">{{ user()?.name }}</p>
          <p class="text-xs text-slate-400 truncate">{{ user()?.email }}</p>
        </div>
      </div>
      <div class="flex gap-2">
        <a
          routerLink="/perfil"
          class="flex-1 flex items-center justify-center gap-1.5 text-xs text-slate-400 hover:text-white py-1.5 px-2 rounded hover:bg-slate-800 transition-colors"
        >
          <i class="pi pi-user text-[11px]"></i> Perfil
        </a>
        <button
          (click)="logout()"
          class="flex-1 flex items-center justify-center gap-1.5 text-xs text-slate-400 hover:text-red-400 py-1.5 px-2 rounded hover:bg-slate-800 transition-colors"
        >
          <i class="pi pi-sign-out text-[11px]"></i> Sair
        </button>
      </div>
    </div>

  </aside>

  <!-- Conteúdo -->
  <main class="flex-1 overflow-auto p-8">
    <router-outlet />
  </main>

</div>
