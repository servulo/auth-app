# Application
quarkus.application.name=auth-backend
quarkus.http.port=8081

# DataSource
quarkus.datasource.db-kind=mssql
quarkus.datasource.username=${DB_USERNAME:sa}
quarkus.datasource.password=${DB_PASSWORD:SprjAuth@2025}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=sprj_auth;encrypt=false}

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=none

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# OIDC
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8080/realms/sprj}
quarkus.oidc.client-id=auth-frontend
quarkus.oidc.application-type=service
# Roles: client roles do client auth-frontend (onde super-admin está definido)
quarkus.oidc.roles.role-claim-path=resource_access/auth-frontend/roles

# Keycloak Admin REST Client
quarkus.keycloak.admin-client.server-url=${KEYCLOAK_URL:http://localhost:8080}
quarkus.keycloak.admin-client.realm=master
quarkus.keycloak.admin-client.client-id=admin-cli
quarkus.keycloak.admin-client.username=${KEYCLOAK_ADMIN_USERNAME:admin}
quarkus.keycloak.admin-client.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
quarkus.keycloak.admin-client.grant-type=PASSWORD

# Keycloak Token REST Client
quarkus.rest-client.keycloak-token.url=${KEYCLOAK_URL:http://localhost:8080}

# Keycloak realm e client configurados na aplicação
app.keycloak.realm=${KEYCLOAK_REALM:sprj}
# auth-frontend: client público com directAccessGrantsEnabled — usado nas chamadas ROPC
app.keycloak.client-id=auth-frontend

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Auth API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de autenticação e gerenciamento de usuários do ecossistema SPRJ
quarkus.swagger-ui.always-include=true

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
