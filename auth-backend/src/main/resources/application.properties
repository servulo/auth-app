# Application
quarkus.application.name=auth-backend
quarkus.http.port=8081

# DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:sprj}
quarkus.datasource.password=${DB_PASSWORD:sprj}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/sprj_auth}

# Hibernate
quarkus.hibernate-orm.database.generation=none

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# OIDC
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8080/realms/sprj}
quarkus.oidc.client-id=auth-backend
quarkus.oidc.application-type=service

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Auth API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de autenticação e gerenciamento de usuários do ecossistema SPRJ
quarkus.swagger-ui.always-include=true

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
